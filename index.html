<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabBlast — Multi-Tab Opener</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google AdSense placeholder (replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID) -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       TOP BANNER AD
  ═══════════════════════════════════════════════════ -->
  <div class="ad-banner ad-top" aria-label="Advertisement">
    <span class="ad-label">Advertisement</span>
    <!-- Replace this comment with your actual ad code -->
    <!-- <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
    <div class="ad-placeholder">[ Top Banner Ad — 728×90 ]</div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════════════════ -->
  <main class="container">

    <header class="hero">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="8" width="24" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
          <rect x="8" y="14" width="24" height="18" rx="3" fill="var(--surface)" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="20" width="24" height="18" rx="3" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
        </svg>
        <h1 class="logo-text">Tab<span>Blast</span></h1>
      </div>
      <p class="tagline">Open any URL across multiple tabs — instantly.</p>
    </header>

    <section class="card" id="main-card">

      <!-- URL Input -->
      <div class="field">
        <label for="url-input">Target URL</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none">
            <path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 14.4c-3.53 0-6.4-2.87-6.4-6.4S6.47 3.6 10 3.6 16.4 6.47 16.4 10 13.53 16.4 10 16.4zM7 10h6M10 7v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            type="url"
            id="url-input"
            placeholder="https://example.com"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="paste-btn" id="paste-btn" title="Paste from clipboard">
            <svg viewBox="0 0 20 20" fill="none">
              <rect x="7" y="3" width="10" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 5H4a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="url-error"></span>
      </div>

      <!-- Tab Count Input -->
      <div class="field field-row">
        <div class="field-col">
          <label for="tab-count">Number of Tabs</label>
          <div class="number-wrap">
            <button class="num-btn" id="decrement" aria-label="Decrease">−</button>
            <input
              type="number"
              id="tab-count"
              value="5"
              min="1"
              max="20"
              aria-label="Number of tabs"
            />
            <button class="num-btn" id="increment" aria-label="Increase">+</button>
          </div>
          <span class="hint">Max 20 tabs</span>
        </div>

        <div class="field-col delay-info">
          <label>Delay Mode</label>
          <div class="delay-badge">
            <svg viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/>
              <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Random 1–5 sec
          </div>
          <span class="hint">Prevents browser crash</span>
        </div>
      </div>

      <!-- MIDDLE AD -->
      <div class="ad-banner ad-middle" aria-label="Advertisement">
        <span class="ad-label">Advertisement</span>
        <!-- Replace with actual ad code -->
        <!-- <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
        <div class="ad-placeholder">[ Middle Ad — 468×60 ]</div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-wrap" id="progress-wrap" aria-live="polite">
        <div class="progress-header">
          <span id="progress-text">Ready</span>
          <span id="progress-count"></span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="btn-group">
        <button class="btn btn-primary" id="open-btn">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M10 3v14M3 10l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Open Tabs
        </button>
        <button class="btn btn-danger" id="stop-btn" disabled>
          <svg viewBox="0 0 20 20" fill="none">
            <rect x="5" y="5" width="10" height="10" rx="1" fill="currentColor"/>
          </svg>
          Stop
        </button>
      </div>

      <!-- Status Log -->
      <div class="log-wrap" id="log-wrap">
        <ul class="log-list" id="log-list"></ul>
      </div>

    </section>

    <!-- Results summary -->
    <div class="summary" id="summary" aria-live="polite"></div>

  </main>

  <!-- ═══════════════════════════════════════════════════
       BOTTOM STICKY AD
  ═══════════════════════════════════════════════════ -->
  <div class="ad-banner ad-sticky" aria-label="Advertisement">
    <span class="ad-label">Advertisement</span>
    <!-- Replace with actual ad code -->
    <!-- <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
    <div class="ad-placeholder">[ Sticky Bottom Ad — 320×50 ]</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
